<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2d52"/>
      <stop offset="100%" style="stop-color:#0e9e8e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Bar chart rising (analyst symbol) -->
  <rect x="5" y="20" width="4" height="7" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="11" y="15" width="4" height="12" rx="1" fill="rgba(255,255,255,0.55)"/>
  <rect x="17" y="10" width="4" height="17" rx="1" fill="rgba(255,255,255,0.75)"/>
  <rect x="23" y="5" width="4" height="22" rx="1" fill="#ffffff"/>

  <!-- Trend line over bars -->
  <polyline points="7,19 13,13 19,9 25,4" fill="none" stroke="#0e9e8e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot at tip of trend line -->
  <circle cx="25" cy="4" r="1.8" fill="#14c2af"/>
</svg>
